# docker-compose.yml

version: "3.8"

services:
  postgres:
    image: postgres:17.6
    container_name: taskprocessor-postgres
    restart: unless-stopped
    environment:
      # значения по умолчанию, если переменные окружения не заданы
      POSTGRES_DB: ${POSTGRES_DB:-taskprocessor_db}
      POSTGRES_USER: ${POSTGRES_USER:-taskprocessor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskprocessor}
    ports:
      # пробрасываем порт Postgres на хост, если нужно подключаться с хоста
      - "${POSTGRES_HOST_PORT:-5433}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # проверяем готовность Postgres через pg_isready
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskprocessor} -d ${POSTGRES_DB:-taskprocessor_db}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    container_name: taskprocessor-app
    restart: unless-stopped
    depends_on:
      postgres:
        # ждём пока postgres станет healthy (healthcheck)
        condition: service_healthy
    env_file:
      - .env
    environment:
      # настройки БД для приложения (DatabaseFactory читает эти env переменные)
      DB_URL: "jdbc:postgresql://postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-taskprocessor_db}"
      DB_USER: "${POSTGRES_USER:-taskprocessor}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-taskprocessor}"

      # ключ для внешнего AI-сервиса (если нужен)
      AI_API_KEY: "${AI_API_KEY}"

      # режим Ktor (в проде лучше false)
      KTOR_DEVELOPMENT: "false"

      # порт приложения (если где-то внутри используешь переменную PORT)
      PORT: "8080"
    ports:
      - "8080:8080"
    healthcheck:
      # проверяем что корневой эндпоинт доступен
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/ || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  postgres_data: