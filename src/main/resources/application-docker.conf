ktor {
  deployment {
    port = 8080
    host = "0.0.0.0"
  }
}

database {
  # url и креды можно переопределить через переменные окружения (Docker / хост)
  url = ${?DB_URL}
  driver = "org.postgresql.Driver"
  user = ${?DB_USER}
  password = ${?DB_PASSWORD}
  maximumPoolSize = 10
}

cors {
  allowedHosts = ["localhost:3000", "localhost:8080"]
  development = true
}

processing {
  workerCount = 2
  useMockAi = true
  useInMemoryRepository = true
}